<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>嘎嘎的專屬歌單</title>
    
    <link rel="stylesheet" href="index-TtaK3aRU.css">
    
    <style>
        

        :root { --my-avatar: url('avatar.jpg'); }
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background-color: transparent !important; }

        /* 背景影片 */
        .background-video, video[class*="background"] {
            position: fixed !important; top: 0; left: 0; width: 100vw !important; height: 100vh !important;
            object-fit: cover !important; z-index: -1 !important; display: block !important; opacity: 1 !important;
        }

        #app, .app-root, .app-shell { background: transparent !important; transition: opacity 0.3s ease; }
        
        /* ✅ 讓所有區塊應用變數 */
        .sidebar-body, .app-card, .main-card, .monitor-card, .profile-card, .random-shell {
            background: var(--panel-bg) !important;
            color: var(--text-color) !important;
            border: 1px solid var(--border-color) !important;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease !important;
        }

        

        /* 文字顏色同步 */
        .sidebar-name, .sidebar-count, .unit-text, .song-title-text, .monitor-title {
            color: var(--text-color) !important;
        }

        .ui-hidden #app { opacity: 0 !important; pointer-events: none !important; }

        .avatar { background-image: var(--my-avatar) !important; background-size: cover !important; border-radius: 50% !important; border: 2px solid #b3e5fc !important; }
        img[src*="playing_cards"]:not(.sidebar-action-icon) { display: none !important; }

        /* 迷你播放器容器 */
        #yt-player-container {
            position: fixed; bottom: 20px; right: 20px; z-index: 2147483647 !important; 
            background: var(--panel-bg) !important; 
            color: var(--text-color) !important;
            padding: 15px; border-radius: 12px; display: none; 
            border: 1.5px solid #3949ab; box-shadow: 0 8px 20px rgba(0,0,0,0.3); width: 280px; text-align: center;
            cursor: move; user-select: none; touch-action: none;
        }

        .close-player { position: absolute; top: 5px; right: 8px; cursor: pointer; font-size: 18px; color: #999; font-weight: bold; line-height: 1; z-index: 10; }
        .close-player:hover { color: #ff4444; }
        #now-playing { font-weight: bold; color: #3949ab; font-size: 14px; margin-bottom: 12px; display: flex; justify-content: center; flex-wrap: wrap; gap: 4px; min-height: 24px; line-height: 24px; }
        [data-theme="dark"] #now-playing { color: #818cf8; }

        .jump-char { display: inline-block; transform: translateY(0); }
        .is-playing .jump-char { animation: letter-jump-1s var(--total-cycle) linear infinite; }
        @keyframes letter-jump-1s { 0%, 20%, 100% { transform: translateY(0); } 10% { transform: translateY(-10px); } }
        .player-controls { display: flex; justify-content: center; gap: 15px; margin: 10px 0 5px 0; }
        .p-btn { background: #3949ab; color: white; border: none; padding: 6px 16px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 12px; transition: 0.1s; }
        .p-btn:hover { background: #5c6bc0; }
        .slider-group { display: flex; align-items: center; gap: 8px; margin: 8px 0; }
        .slider-group label { font-size: 11px; opacity: 0.8; min-width: 30px; font-weight: bold; }
        input[type="range"] { flex: 1; height: 12px; cursor: pointer; accent-color: #3949ab; }

        /* ✅ 深淺切換按鈕樣式 (標題右邊) */
        .theme-toggle-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 26px;
            height: 26px;
            margin-left: 10px;
            padding: 0;
            background: #f9f793;
            color: white;
            border: 1px solid #fff;
            border-radius: 50%;
            cursor: pointer;
            font-size: 14px;
            vertical-align: middle;
            transition: 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .theme-toggle-btn:hover { transform: scale(1.1); background: #5c6bc0; }

        .mini-hide-btn {
            display: inline-block;
            margin-left: 8px;
            padding: 2px 6px;
            font-size: 10px;
            background: #3949ab;
            color: white !important;
            border: 1px solid #fff;
            border-radius: 4px;
            cursor: pointer;
            vertical-align: middle;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 2147483647 !important;
            pointer-events: auto !important;
        }

        .ui-hidden .mini-hide-btn {
            position: fixed !important;
            bottom: 20px !important;
            left: 20px !important;
            margin: 0 !important;
            padding: 8px 16px !important;
            font-size: 13px !important;
            border-radius: 20px !important;
            background: #1a237e !important;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5) !important;
            opacity: 1 !important;
            visibility: visible !important;
        }
    </style>
</head>
<body>
    <!-- ✅ 按鈕現在由 JS 動態注入到標題旁邊，此處 HTML 結構保持簡潔 -->
    <video autoplay muted loop playsinline id="fixed-bg-video" class="my-permanent-bg">
        <source src="background.mp4" type="video/mp4">
    </video>

    <div id="app"></div>

    <div id="yt-player-container">
        <div class="close-player" onclick="closePlayer()">×</div>
        <div id="now-playing">🎵 準備播放...</div>
        <div class="slider-group">
            <label>進度</label>
            <input type="range" id="seek-bar" value="0" step="0.1">
        </div>
        <div class="slider-group">
            <label>音量</label>
            <input type="range" id="volume-bar" min="0" max="1" step="0.05" value="0.5">
        </div>
        <div class="player-controls">
            <button class="p-btn" id="play-pause-btn">暫停</button>
            <button class="p-btn" id="stop-btn">停止</button>
        </div>
    </div>

    <script>
        let uiVisible = true;

        setInterval(() => {
            const icons = document.querySelectorAll('.sidebar-action-icon');
            icons.forEach(img => { if (!img.src.endsWith('playing_cards.png')) img.src = 'playing_cards.png'; });
            const bgImg = document.querySelector('.background-image');
            if (bgImg) { bgImg.remove(); }

            // ✅ 注入深淺色切換按鈕到「嘎嘎的專屬歌單」右邊
            const nameDiv = document.querySelector('.sidebar-name');
            if (nameDiv && !document.getElementById('injected-theme-btn')) {
                const themeBtn = document.createElement('button');
                themeBtn.id = 'injected-theme-btn';
                themeBtn.className = 'theme-toggle-btn';
                themeBtn.innerHTML = document.documentElement.getAttribute('data-theme') === 'dark' ? '☀️' : '🌙';
                themeBtn.onclick = (e) => {
                    e.stopPropagation();
                    toggleTheme();
                };
                nameDiv.appendChild(themeBtn);
            }

            // 動態注入隱藏按鈕
            const countDiv = document.querySelector('.sidebar-count');
            if (countDiv && !document.getElementById('injected-hide-btn')) {
                const btn = document.createElement('button');
                btn.id = 'injected-hide-btn';
                btn.className = 'mini-hide-btn';
                btn.innerText = '隱藏介面';
                btn.onclick = (e) => {
                    e.stopPropagation();
                    toggleUI();
                };
                countDiv.appendChild(btn);
            }
        }, 500);

        function toggleTheme() {
            const body = document.documentElement;
            const btn = document.getElementById('injected-theme-btn');
            const currentTheme = body.getAttribute('data-theme');
            
            if (currentTheme === 'dark') {
                body.setAttribute('data-theme', 'light');
                if(btn) btn.innerText = '🌙';
            } else {
                body.setAttribute('data-theme', 'dark');
                if(btn) btn.innerText = '☀️';
            }
        }

        function toggleUI() {
            const body = document.body;
            const btn = document.getElementById('injected-hide-btn');
            if (uiVisible) {
                body.classList.add('ui-hidden');
                if(btn) btn.innerText = "顯示介面";
                document.body.appendChild(btn);
            } else {
                body.classList.remove('ui-hidden');
                if(btn) btn.innerText = "隱藏介面";
                const countDiv = document.querySelector('.sidebar-count');
                if(countDiv) countDiv.appendChild(btn);
            }
            uiVisible = !uiVisible;
        }

        function closePlayer() {
            if (currentAudio) { currentAudio.pause(); }
            document.getElementById('yt-player-container').style.display = 'none';
            document.getElementById('yt-player-container').classList.remove('is-playing');
        }

        function setAnimatedTitle(title) {
            const container = document.getElementById('now-playing');
            container.innerHTML = '🎵 ';
            const chars = title.split('');
            container.style.setProperty('--total-cycle', chars.length + 's');
            chars.forEach((char, index) => {
                const span = document.createElement('span');
                span.innerText = char === ' ' ? '\u00A0' : char;
                span.className = 'jump-char';
                span.style.animationDelay = index + 's';
                container.appendChild(span);
            });
        }
    </script>

    <script type="module" src="index-B0fFHRwv.js"></script>

    <script>
        let currentAudio = null;

        document.addEventListener('click', function(e) {
            if (e.target.id === 'injected-hide-btn' || e.target.id === 'injected-theme-btn') return;
            const target = e.target;
            const isVisualItem = target.classList.contains('tag-cloud-item') || target.classList.contains('danmaku-item') || target.classList.contains('unit-text');
            const row = target.closest('.song-row') || target.closest('.random-card') || (isVisualItem ? target : null);

            if (row) {
                let title = "";
                if (isVisualItem) { title = target.innerText; }
                else {
                    const titleEl = row.querySelector('.song-title-text') || row.querySelector('.song-title') || row.querySelector('.unit-text') || row.querySelector('.card-title') || row;
                    title = titleEl.innerText;
                }
                title = title.replace('NEW', '').replace('🎵', '').trim();
                if (!title) return;

                let fileName = "";
                row.querySelectorAll?.('span, div').forEach(el => { if (el.innerText.toLowerCase().includes('.mp3')) fileName = el.innerText.trim(); });
                if (!fileName) fileName = title + ".mp3";

                initMiniAudioPlayer(fileName, title);

                let syncCount = 0;
                const syncTimer = setInterval(() => {
                    const modalTitle = document.querySelector('.monitor-title');
                    if (modalTitle) { modalTitle.innerText = title; clearInterval(syncTimer); }
                    syncCount++;
                    if (syncCount > 20) clearInterval(syncTimer);
                }, 100);
            }
        }, true);

        function initMiniAudioPlayer(file, title) {
            const container = document.getElementById('yt-player-container');
            const playPauseBtn = document.getElementById('play-pause-btn');
            container.style.display = 'block';
            setAnimatedTitle(title);
            if (currentAudio && currentAudio.src.includes(encodeURIComponent(file))) {
                if (currentAudio.paused) { currentAudio.play(); playPauseBtn.innerText = "暫停"; container.classList.add('is-playing'); }
                return;
            }
            if (currentAudio) { currentAudio.pause(); }
            currentAudio = new Audio(`./songs/${file}`);
            currentAudio.volume = document.getElementById('volume-bar').value;
            setupEventListeners(playPauseBtn);
            currentAudio.play().catch(err => console.log("等待手動點擊"));
            container.classList.add('is-playing');
            playPauseBtn.innerText = "暫停";
        }

        function setupEventListeners(playBtn) {
            const stopBtn = document.getElementById('stop-btn');
            const seekBar = document.getElementById('seek-bar');
            const volBar = document.getElementById('volume-bar');
            const container = document.getElementById('yt-player-container');
            playBtn.onclick = () => { if (currentAudio.paused) { currentAudio.play(); playBtn.innerText = "暫停"; container.classList.add('is-playing'); } else { currentAudio.pause(); playBtn.innerText = "播放"; container.classList.remove('is-playing'); } };
            stopBtn.onclick = () => { currentAudio.pause(); currentAudio.currentTime = 0; playBtn.innerText = "播放"; container.classList.remove('is-playing'); };
            currentAudio.ontimeupdate = () => { if (!isNaN(currentAudio.duration)) { seekBar.max = currentAudio.duration; seekBar.value = currentAudio.currentTime; } };
            seekBar.oninput = () => { currentAudio.currentTime = seekBar.value; };
            volBar.oninput = () => { currentAudio.volume = volBar.value; };
            currentAudio.onended = () => { playBtn.innerText = "播放"; seekBar.value = 0; container.classList.remove('is-playing'); };
        }

        const playerContainer = document.getElementById('yt-player-container');
        let isDragging = false, offsetX, offsetY;
        playerContainer.addEventListener('mousedown', (e) => { 
            if (e.target.closest('.p-btn') || e.target.closest('input') || e.target.closest('.close-player')) return; 
            isDragging = true; offsetX = e.clientX - playerContainer.getBoundingClientRect().left; offsetY = e.clientY - playerContainer.getBoundingClientRect().top; playerContainer.style.transition = 'none'; 
        });
        document.addEventListener('mousemove', (e) => { if (!isDragging) return; playerContainer.style.right = 'auto'; playerContainer.style.bottom = 'auto'; playerContainer.style.left = (e.clientX - offsetX) + 'px'; playerContainer.style.top = (e.clientY - offsetY) + 'px'; });
        document.addEventListener('mouseup', () => { isDragging = false; });
    </script>
</body>
</html>
